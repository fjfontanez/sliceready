name: Feature Request
description: Suggest a feature or enhancement for SliceReady
labels: ["enhancement", "status:needs-review"]

body:
  - type: markdown
    attributes:
      value: |
        ## 📋 How this works

        1. **Submit** this request → it gets `status:needs-review` automatically.
        2. A **maintainer reviews** it and adds `status:approved` (or closes it as out-of-scope/duplicate).
        3. **Only then** should a PR be opened to implement it.

        PRs that implement features without `status:approved` on the linked issue are automatically rejected by CI.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I have searched [existing issues](https://github.com/fjfontanez/sliceready/issues) and this is not a duplicate
          required: true
        - label: I understand that PRs are rejected if the linked issue does not have `status:approved`
          required: true

  - type: dropdown
    id: area
    attributes:
      label: 🔍 Affected Area
      options:
        - Repair engine / ADMesh WASM
        - Viewer (3D)
        - Dropzone / file upload
        - UI / copy
        - Build / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 💡 Problem Statement
      description: What problem does this solve? Describe it clearly.
      placeholder: |
        I'm always frustrated when...
        It's currently not possible to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 📦 Proposed Solution
      description: Describe the solution you'd like. Be specific.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 📎 Additional Context
    validations:
      required: false
