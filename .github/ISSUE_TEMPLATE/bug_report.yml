name: Bug Report
description: Report a bug in SliceReady
labels: ["bug", "status:needs-review"]

body:
  - type: markdown
    attributes:
      value: |
        ## 📋 How this works

        1. **Submit** this bug report → it gets `status:needs-review` automatically.
        2. A **maintainer reviews** it and adds `status:approved` (or closes it as invalid/duplicate).
        3. **Only then** should a PR be opened to fix it.

        PRs that fix issues without `status:approved` on the linked issue are automatically rejected by CI.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I have searched [existing issues](https://github.com/fjfontanez/sliceready/issues) and this is not a duplicate
          required: true
        - label: I understand that PRs are rejected if the linked issue does not have `status:approved`
          required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔄 Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 📋 Affected Area
      options:
        - Repair engine / ADMesh WASM
        - Viewer (3D)
        - Dropzone / file upload
        - UI / copy
        - Build / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: filetype
    attributes:
      label: File Type
      description: Which mesh format triggered the bug?
      options:
        - STL
        - 3MF
        - Not file-specific
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "e.g. Chrome 141 on macOS 15"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 💡 Console Output / Errors
      description: Paste any relevant browser console output. Auto-formatted as code.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, the model that failed (if shareable), etc. Do not upload anything private — the tool runs locally for a reason.
    validations:
      required: false
